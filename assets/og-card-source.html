<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Super Simple Contacts social card</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      color: #f5f7fb;
      background:
        radial-gradient(circle at 42% 42%, rgba(6,114,255,.12), transparent 25%),
        radial-gradient(circle at 59% 46%, rgba(157,62,223,.1), transparent 24%),
        radial-gradient(circle at 54% 57%, rgba(255,86,99,.055), transparent 22%),
        #050608;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main { display: flex; align-items: center; flex-direction: column; transform: translateY(-4px); text-align: center; }
    img { width: 182px; height: 182px; filter: drop-shadow(0 0 35px rgba(73,64,236,.22)) drop-shadow(0 22px 38px rgba(0,0,0,.4)); }
    h1 { margin: 38px 0 0; font-size: 68px; line-height: 1; letter-spacing: -.052em; font-weight: 710; }
  </style>
</head>
<body>
  <main>
    <img src="synchronicity-mark-v1.svg" alt="">
    <h1>Super Simple Contacts</h1>
  </main>
</body>
</html>
