<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Super Simple Contacts social card</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      padding: 0 68px;
      color: #171716;
      background: #f5f2f5 url("og-background.png") center / cover no-repeat;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main { width: 590px; transform: translateY(-4px); }
    .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 42px; color: #4e43df; font-size: 24px; font-weight: 750; letter-spacing: -.02em; }
    .brand img { width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 8px 20px rgba(48,36,137,.2); }
    h1 { margin: 0; font-size: 67px; line-height: .98; letter-spacing: -.062em; font-weight: 760; }
    h1 span { display: block; background: linear-gradient(105deg, #087aff, #5548ed 38%, #b63bd2 61%, #ef3f82 79%, #ff7a2f); background-clip: text; -webkit-background-clip: text; color: transparent; -webkit-text-fill-color: transparent; }
    p { width: 540px; margin: 28px 0 0; color: #66646b; font-size: 23px; line-height: 1.38; letter-spacing: -.018em; }
    .platforms { display: flex; gap: 10px; margin-top: 34px; }
    .platforms span { padding: 9px 14px; border: 1px solid rgba(52,49,65,.1); border-radius: 20px; background: rgba(255,255,255,.6); color: #5a5860; font-size: 14px; font-weight: 650; backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <main>
    <div class="brand"><img src="app-icon.png" alt="">Super Simple Contacts</div>
    <h1>Every person.<span>Right when you need them.</span></h1>
    <p>Fast, private contact control for Apple, Google, and Microsoft accounts.</p>
    <div class="platforms"><span>Mac</span><span>iPhone</span><span>iPad</span></div>
  </main>
</body>
</html>
